name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Read version
      id: vars
      run: |
        # Read the version from the VERSION file
        VERSION=$(cat VERSION | xargs)
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        
        # Decide Docker Tag
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          echo "DOCKER_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
        else
          echo "DOCKER_TAG=latest" >> $GITHUB_ENV
        fi

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Custom Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io/mr-davtyan/needlenode
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ghcr.io/mr-davtyan/needlenode/needlenode:${{ env.DOCKER_TAG }}
          ghcr.io/mr-davtyan/needlenode/needlenode:${{ env.VERSION }}
        cache-from: type=registry,ref=ghcr.io/mr-davtyan/needlenode/needlenode:build-cache
        cache-to: type=registry,ref=ghcr.io/mr-davtyan/needlenode/needlenode:build-cache,mode=max
